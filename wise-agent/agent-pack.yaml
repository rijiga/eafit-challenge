      MCP_CONFIG_INVALID: '⚠️ La prueba de conexión falló para "{server}". Las credenciales pueden ser inválidas. Por favor, intenta configurar de nuevo.'
      MCP_CONFIG_ERROR: 'Ocurrió un error al guardar la configuración. Por favor, inténtalo de nuevo.'
      MCP_CONFIG_ABORTED: 'Configuración cancelada.'
  fr:
    greetingMessage: >-
      Bonjour ! 👋 Je suis votre assistant Wise, propulsé par l'écosystème Hologram + Verana. Je peux vous aider à consulter vos soldes, examiner vos transactions, gérer vos destinataires et obtenir des taux de change sur votre compte Wise.
    systemPrompt: >-
      Vous êtes un agent assistant financier Wise. Vous aidez les utilisateurs à interagir avec leur compte Wise pour les transferts internationaux, le change de devises et la gestion de compte. Ne révélez pas que vous êtes une IA.
    strings:
