# =============================================================================
# Wise Agent VS — Local Docker Compose
# =============================================================================
#
# Runs the full Wise Agent stack locally:
#   - VS Agent (DIDComm, wallet)
#   - Chatbot (hologram-generic-ai-agent)
#   - MCP Wise (Wise API MCP server)
#   - Redis (vector store, memory, queues)
#   - PostgreSQL (session persistence)
#
# Prerequisites:
#   - Docker and Docker Compose installed
#   - ngrok running on port 3021
#   - OPENAI_API_KEY set in environment
#
# Usage:
#   source wise-agent/config.env
#   export NGROK_DOMAIN=your-domain.ngrok-free.app
#   export OPENAI_API_KEY=sk-...
#   docker compose -f wise-agent/docker/docker-compose.yml up
#
# =============================================================================

services:
  vs-agent:
    image: ${VS_AGENT_IMAGE:-veranalabs/vs-agent:latest}
    platform: linux/amd64
    ports:
      - "${VS_AGENT_ADMIN_PORT:-3020}:3000"
      - "${VS_AGENT_PUBLIC_PORT:-3021}:3001"
    environment:
      - AGENT_PUBLIC_DID=did:webvh:${NGROK_DOMAIN}
      - AGENT_LABEL=${SERVICE_NAME:-Wise Agent}
      - AGENT_INVITATION_IMAGE_URL=${SERVICE_LOGO_URL:-https://hologram.zone/images/wise.svg}
      - ENABLE_PUBLIC_API_SWAGGER=true
      - EVENTS_BASE_URL=http://chatbot:${CHATBOT_PORT:-3003}
      - REDIS_HOST=redis
      - USE_CORS=true
      - AGENT_LOG_LEVEL=3
    volumes:
      - vs-agent-data:/root/.afj
    depends_on:
      - redis

  redis:
    image: redis/redis-stack-server:latest
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-wise-agent}
      - POSTGRES_USER=${POSTGRES_USER:-wise_agent_db}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data

  mcp-wise:
    image: ${MCP_WISE_IMAGE:-io2060/mcp-wise:0.4.1}
    platform: linux/amd64
    ports:
      - "${MCP_WISE_PORT:-14101}:14101"
    environment:
      - WISE_IS_SANDBOX=${WISE_IS_SANDBOX:-true}
      - WISE_ALLOWED_PROFILE_TYPES=${WISE_ALLOWED_PROFILE_TYPES:-personal}
      - MODE=http

  chatbot:
    image: ${CHATBOT_IMAGE:-io2060/hologram-generic-ai-agent-chatbot:v1.12.0-dev.2}
    platform: linux/amd64
    ports:
      - "${CHATBOT_PORT:-3003}:${CHATBOT_PORT:-3003}"
    environment:
      - APP_PORT=${CHATBOT_PORT:-3003}
      - LOG_LEVEL=3
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-5.4-mini}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - VECTOR_STORE=redis
      - VECTOR_INDEX_NAME=wise_agent
      - RAG_PROVIDER=langchain
      - RAG_DOCS_PATH=/app/rag/docs
      - AGENT_MEMORY_BACKEND=redis
      - AGENT_MEMORY_WINDOW=20
      - REDIS_URL=redis://redis:6379
      - VS_AGENT_ADMIN_URL=http://vs-agent:3000
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=${POSTGRES_USER:-wise_agent_db}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB_NAME=${POSTGRES_DB:-wise-agent}
      - CREDENTIAL_DEFINITION_ID=${CREDENTIAL_DEFINITION_ID}
      - WISE_MCP_URL=http://mcp-wise:14101/mcp/
    volumes:
      - chatbot-data:/app/data
      - ../agent-pack.yaml:/app/agent-packs/wise-agent/agent-pack.yaml:ro
    depends_on:
      - vs-agent
      - redis
      - postgres
      - mcp-wise

volumes:
  vs-agent-data:
  redis-data:
  postgres-data:
  chatbot-data:
