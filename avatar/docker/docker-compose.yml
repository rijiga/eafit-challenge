# =============================================================================
# Avatar Issuer VS — Local Docker Compose
# =============================================================================
#
# Runs the VS Agent for local development/testing.
#
# Prerequisites:
#   - Docker and Docker Compose installed
#   - ngrok running on port 3003
#   - Organization running (for Service credential issuance)
#
# Usage:
#   source avatar/config.env
#   export NGROK_DOMAIN=your-domain.ngrok-free.app
#   docker compose up
#
# =============================================================================

services:
  vs-agent:
    image: ${VS_AGENT_IMAGE:-veranalabs/vs-agent:latest}
    platform: linux/amd64
    ports:
      - "${VS_AGENT_ADMIN_PORT:-3002}:3000"
      - "${VS_AGENT_PUBLIC_PORT:-3003}:3001"
    environment:
      - AGENT_PUBLIC_DID=did:webvh:${NGROK_DOMAIN}
      - AGENT_LABEL=${SERVICE_NAME:-Avatar Issuer}
      - ENABLE_PUBLIC_API_SWAGGER=true
    volumes:
      - vs-agent-data:/root/.afj

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data

volumes:
  vs-agent-data:
  minio-data:
