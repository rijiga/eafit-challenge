# Organization Agent deployment — Helm chart values
#
# For EAFIT Challenge deployment
chartSource: oci://registry-1.docker.io/veranalabs/vs-agent-chart
chartVersion: v1.9.2

global:
  domain: eafit.testnet.verana.network

name: organization
replicas: 1

adminPort: 3000
didcommPort: 3001
eventsBaseUrl: "https://organization.eafit.testnet.verana.network"
publicDidMethod: "webvh"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

ingress:
  host: "organization.eafit.testnet.verana.network"
  tlsSecret: "organization.eafit.testnet.verana.network-cert"
  public:
    enableCors: true
  private:
    enableCors: true
    whitelistSourceRange: ""
    tlsSecret: ""
    host: ""

extraEnv:
  - name: ENABLE_PUBLIC_API_SWAGGER
    value: "true"
  - name: AGENT_LOG_LEVEL
    value: "3"
  - name: USE_CORS
    value: "true"

storage:
  size: 1Gi
  storageClassName: csi-cinder-high-speed
